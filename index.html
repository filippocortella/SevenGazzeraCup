<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>GAZZERA CUP</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: Arial; margin: 20px; background: #f6f7fb; }
    h1 { text-align: center; }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 20px;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    th { background: #15803d; color: white; padding: 10px; }
    td { padding: 10px; text-align: center; border-bottom: 1px solid #eee; }

    .team { display:flex; align-items:center; justify-content:center; gap:8px; }
    .team img { width:52px; height:52px; object-fit:contain; }

    .first { background:#dcfce7; }
    .last { background:#fee2e2; }

    button {
      background:#16a34a;
      color:white;
      border:none;
      padding:8px;
      border-radius:6px;
      cursor:pointer;
    }

    footer { text-align:center; margin-top:40px; font-size:12px; }

    #utenteTrigger {
      cursor:pointer;
      text-decoration:underline;
      font-size:12px;
      color:#666;
    }

    #loginBox, #adminPanel {
      display:none;
      margin-top:10px;
      background:white;
      padding:10px;
      border-radius:8px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
      max-width:300px;
      margin-left:auto;
      margin-right:auto;
    }

    input { margin:5px 0; padding:5px; width:100%; }
  </style>
</head>

<body>

<h1>🏆 SEVEN GAZZERA CUP 🏆</h1>

<h2>Filtra squadra</h2>
<select id="filtroSquadra" onchange="renderCalendario()"></select>

<h2>🐭 GIRONE DELLA NUTRIA</h2>
<table>
  <thead>
    <tr><th>Squadra</th><th>Punti</th><th>GF</th><th>GS</th><th>Diff</th></tr>
  </thead>
  <tbody id="classificaA"></tbody>
</table>

<h2>🕊 GIRONE DEL GABBIANO</h2>
<table>
  <thead>
    <tr><th>Squadra</th><th>Punti</th><th>GF</th><th>GS</th><th>Diff</th></tr>
  </thead>
  <tbody id="classificaB"></tbody>
</table>

<h2>⚽ Marcatori</h2>
<table>
  <tbody id="marcatori"></tbody>
</table>

<h2>📅 Partite</h2>
<table>
  <thead>
    <tr><th>Ora</th><th>Casa</th><th>Ospite</th></tr>
  </thead>
  <tbody id="calendario"></tbody>
</table>

<footer>
  <span id="utenteTrigger">v1</span>

  <div id="loginBox">
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <div id="adminPanel">
    <h3>Admin</h3>

    <select id="matchSelect"></select><br><br>

    Gol Casa <input id="golCasa" type="number">
    Gol Ospite <input id="golOspite" type="number"><br>

    Marcatori (nome,gol; nome,gol)<br>
    <input id="marcatoriInput"><br><br>

    <button onclick="salvaRisultato()">Salva</button>
    <button onclick="resetTorneo()">Reset</button>
  </div>
</footer>

<script>

const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "torneo-prova-1.firebaseapp.com",
  projectId: "torneo-prova-1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let squadre = [];
let partite = [];
let marcatori = {};

// TOGGLE LOGIN
utenteTrigger.onclick = () => {
  loginBox.style.display = loginBox.style.display === "block" ? "none" : "block";
};

// LOGIN
function login() {
  if (user.value === "pippo" && pass.value === "pippo") {
    adminPanel.style.display = "block";
    loginBox.style.display = "none";
    utenteTrigger.style.display = "none";
  } else alert("Credenziali errate");
}

// CARICA DATI
async function caricaDati(){
  const s = await db.collection("squadre").get();
  squadre = s.docs.map(d=>d.data());

  const p = await db.collection("partite").get();
  partite = p.docs.map(d=>({id:d.id, ...d.data()}));

  const m = await db.collection("marcatori").get();
  marcatori = {};
  m.forEach(doc => marcatori[doc.id] = doc.data().gol);

  renderAll();
}

// RENDER
function renderAll(){
  renderFiltro();
  renderClassifiche();
  renderMarcatori();
  renderCalendario();
  renderAdmin();
}

// FILTRO
function renderFiltro(){
  filtroSquadra.innerHTML='<option value="tutte">Tutte</option>';
  squadre.forEach(s=> filtroSquadra.innerHTML+=`<option>${s.nome}</option>`);
}

// LOGHI
function getLogo(nome){
  const s = squadre.find(x=>x.nome===nome);
  return s?.logo || "";
}

function teamHTML(nome){
  const logo = getLogo(nome);
  return `
    <div class="team">
      ${logo ? `<img src="${logo}">` : ""}
      <span>${nome}</span>
    </div>
  `;
}

// CLASSIFICHE
function renderClassifiche(){
  renderSingola(squadre.filter(s=>s.girone==="A"),"classificaA");
  renderSingola(squadre.filter(s=>s.girone==="B"),"classificaB");
}

function renderSingola(lista,id){
  const tbody=document.getElementById(id);
  tbody.innerHTML="";

  const sorted=[...lista].sort((a,b)=>
    (b.punti||0)-(a.punti||0) ||
    ((b.gf||0)-(b.gs||0))-((a.gf||0)-(a.gs||0))
  );

  sorted.forEach((s,i)=>{
    const diff=(s.gf||0)-(s.gs||0);

    tbody.innerHTML+=`
      <tr class="${i===0?'first':i===sorted.length-1?'last':''}">
        <td>${teamHTML(s.nome)}</td>
        <td>${s.punti||0}</td>
        <td>${s.gf||0}</td>
        <td>${s.gs||0}</td>
        <td>${diff}</td>
      </tr>`;
  });
}

// MARCATORI
function renderMarcatori(){
  const tbody=document.getElementById("marcatori");
  tbody.innerHTML="";

  Object.entries(marcatori)
    .sort((a,b)=>b[1]-a[1])
    .forEach(([n,g])=>{
      tbody.innerHTML+=`<tr><td>${n}</td><td>${g}</td></tr>`;
    });
}

// CALENDARIO
function renderCalendario(){
  const tbody=document.getElementById("calendario");
  tbody.innerHTML="";

  const filtro=filtroSquadra.value;

  partite
    .filter(p=> filtro==="tutte" || p.casa===filtro || p.ospite===filtro)
    .forEach(p=>{
      tbody.innerHTML+=`
        <tr>
          <td>${p.ora||"-"}</td>
          <td>${teamHTML(p.casa)}</td>
          <td>${teamHTML(p.ospite)}</td>
        </tr>`;
    });
}

// ADMIN FIX
function renderAdmin(){
  const select=document.getElementById("matchSelect");
  select.innerHTML="";

  partite
    .filter(p=>!p.giocata) // solo non giocate
    .forEach(p=>{
      select.innerHTML+=`
        <option value="${p.id}">
          ${p.casa} - ${p.ospite}
        </option>`;
    });
}

// SALVA
async function salvaRisultato(){
  const id=matchSelect.value;
  const gC=parseInt(golCasa.value)||0;
  const gO=parseInt(golOspite.value)||0;

  const partita=partite.find(p=>p.id===id);
  if(!partita) return;

  await db.collection("partite").doc(id).update({giocata:true,gC,gO});

  const casa=squadre.find(s=>s.nome===partita.casa);
  const ospite=squadre.find(s=>s.nome===partita.ospite);

  casa.gf+=gC; casa.gs+=gO;
  ospite.gf+=gO; ospite.gs+=gC;

  if(gC>gO) casa.punti+=3;
  else if(gO>gC) ospite.punti+=3;
  else {casa.punti++; ospite.punti++;}

  await db.collection("squadre").doc(casa.nome).set(casa);
  await db.collection("squadre").doc(ospite.nome).set(ospite);

  // MARCATORI
  for(const m of marcatoriInput.value.split(";")){
    let [n,g]=m.split(",");
    if(!n||!g) continue;

    const ref=db.collection("marcatori").doc(n.trim());
    const doc=await ref.get();

    if(doc.exists) await ref.update({gol:doc.data().gol+parseInt(g)});
    else await ref.set({gol:parseInt(g)});
  }

  await caricaDati();
}

// RESET FIX
async function resetTorneo(){
  if(!confirm("Sei sicuro?")) return;

  const s=await db.collection("squadre").get();
  for(const d of s.docs){
    await db.collection("squadre").doc(d.id).update({punti:0,gf:0,gs:0});
  }

  const p=await db.collection("partite").get();
  for(const d of p.docs){
    await db.collection("partite").doc(d.id).update({giocata:false,gC:0,gO:0});
  }

  const m=await db.collection("marcatori").get();
  for(const d of m.docs){
    await db.collection("marcatori").doc(d.id).delete();
  }

  await caricaDati();
}

caricaDati();

</script>

</body>
</html>
