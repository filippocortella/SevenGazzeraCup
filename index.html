<!DOCTYPE html>
<html>
<head>
  <title>Calendario Squadra</title>

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    #calendar {
      max-width: 700px;
      margin: 30px auto;
    }

    /* testo a capo eventi */
    .fc-event-title {
      white-space: normal !important;
    }

    #footer {
      margin-top: 40px;
      font-size: 12px;
      cursor: pointer;
      text-decoration: underline;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 9999;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      position: relative;
      z-index: 10000;
    }

    .close {
      position: absolute;
      top: 10px;
      right: 15px;
      cursor: pointer;
      font-size: 18px;
    }

    input, select, button {
      width: 100%;
      margin-top: 10px;
      padding: 8px;
    }
  </style>
</head>

<body>

<h1>Calendario Squadra ⚽</h1>

<div id="calendar"></div>

<div id="footer" onclick="openLogin()">v1</div>

<!-- LOGIN -->
<div id="loginModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('loginModal')">✖</span>
    <h3>Login Admin</h3>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Accedi</button>
  </div>
</div>

<!-- ADMIN -->
<div id="adminModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('adminModal')">✖</span>
    <h3>Nuovo Evento</h3>

    <select id="tipo">
      <option value="Allenamento">Allenamento</option>
      <option value="Partita">Partita</option>
      <option value="Altro">Altro</option>
    </select>

    <input type="date" id="data">
    <input type="time" id="ora">
    <input type="text" id="luogo" placeholder="Dove">

    <button onclick="addEvent()">INVIA</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCvqU28XLWRsfJUso0MuS72O2Qxks-MFP0",
    authDomain: "marzenego-2e266.firebaseapp.com",
    projectId: "marzenego-2e266"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let calendar;
  let isAdmin = false;

  async function loadEvents() {
    try {
      const snapshot = await getDocs(collection(db, "eventi"));
      let eventi = [];

      snapshot.forEach(docSnap => {
        const d = docSnap.data();

        eventi.push({
          id: docSnap.id,
          title: d.tipo + (d.luogo ? " - " + d.luogo : ""),
          start: d.data + "T" + d.ora,
          color: d.tipo === "Partita" ? "red" :
                 d.tipo === "Allenamento" ? "blue" : "green"
        });
      });

      return eventi;

    } catch (error) {
      console.error("Errore Firebase:", error);
      return [];
    }
  }

  document.addEventListener('DOMContentLoaded', async function() {
    const calendarEl = document.getElementById('calendar');

    let eventi = await loadEvents();

    calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      events: eventi,
      dayMaxEvents: false,

      eventTimeFormat: {
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      },

      eventClick: async function(info) {

        if (!isAdmin) {
          alert("Solo admin può cancellare eventi");
          return;
        }

        if (confirm("Vuoi eliminare questo evento?")) {
          try {
            await deleteDoc(doc(db, "eventi", info.event.id));
          } catch(e) {
            console.log("Errore eliminazione:", e);
          }
          info.event.remove();
        }
      }
    });

    calendar.render();
  });

  window.openLogin = function() {
    document.getElementById("loginModal").style.display = "flex";
  }

  window.login = function() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if (user === "pippo" && pass === "pippo") {
      isAdmin = true;
      closeModal("loginModal");
      document.getElementById("adminModal").style.display = "flex";
    } else {
      alert("Credenziali errate");
    }
  }

  window.closeModal = function(id) {
    document.getElementById(id).style.display = "none";
  }

  window.addEvent = async function() {
    const tipo = document.getElementById("tipo").value;
    const data = document.getElementById("data").value;
    const ora = document.getElementById("ora").value;
    const luogo = document.getElementById("luogo").value;

    if (!data || !ora) {
      alert("Compila tutti i campi");
      return;
    }

    try {
      const docRef = await addDoc(collection(db, "eventi"), {
        tipo,
        data,
        ora,
        luogo
      });

      calendar.addEvent({
        id: docRef.id,
        title: tipo + (luogo ? " - " + luogo : ""),
        start: data + "T" + ora,
        color: tipo === "Partita" ? "red" :
               tipo === "Allenamento" ? "blue" : "green"
      });

    } catch (error) {
      console.error("Errore aggiunta:", error);
      alert("Errore nel salvataggio");
    }

    closeModal("adminModal");
  }

</script>

</body>
</html>
